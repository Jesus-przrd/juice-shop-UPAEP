name: Simulacion de Incidente - ZAP DAST (UPAEP)

# DAST contra la instancia real desplegada del equipo (no la de OWASP).
# Configura la variable de repositorio DEPLOY_URL (Settings > Secrets and
# variables > Actions > Variables) con la URL publica una vez que exista el
# despliegue en la nube. Mientras esa variable no exista, el job se omite en
# vez de fallar en cada push.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  zap_scan:
    if: ${{ vars.DEPLOY_URL != '' }}
    runs-on: ubuntu-latest
    name: Escaneo ZAP sobre la instancia desplegada (Proyecto2)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Despertar la instancia (cold start de Render free tier)
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.DEPLOY_URL }}" || echo "000")
            echo "Intento $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Instancia lista para escanear."
              exit 0
            fi
            sleep 10
          done
          echo "La instancia no respondio a tiempo, se intenta escanear de todas formas."

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: ${{ vars.DEPLOY_URL }}
          cmd_options: '-a -j'
          fail_action: false
          allow_issue_writing: false

      - name: Subir reporte de ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-incident-report
          path: |
            report_html.html
            report_json.json
            report_md.md
